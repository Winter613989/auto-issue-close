name: Auto Close Labeled Issues

on:
  issues:
    types: [labeled]

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues labeled 'completed' or 'wontfix'
        uses: actions/github-script@v7
        with:
          script: |
            const label = context.payload.label.name;
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (label === 'completed' || label === 'wontfix') {
              await github.rest.issues.update({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                state: 'closed'
              });

              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: `This issue has been automatically closed because it was labeled as '${label}'.`
              });

              console.log(`Issue #${issueNumber} closed due to '${label}' label.`);
            } else {
              console.log(`Label '${label}' is not a trigger label. No action taken.`);
            }
